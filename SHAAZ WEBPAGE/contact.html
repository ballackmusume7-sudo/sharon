<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Kabianga - Contact</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        nav a {
            margin: 10px;
            text-decoration: none;
            color: white;
        }
        nav {
            background-color: #333;
            text-align: center;
            padding: 10px;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .container {
            width: 60%;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 15px;
        }
        .contact-info {
            margin-top: 30px;
        }
        .contact-info p {
            font-size: 1.1em;
            color: #333;
        }
        .contact-info .address, .contact-info .phone, .contact-info .email {
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>University of Kabianga</h1>
        <p>Contact Us</p>
    </header>

    <nav>
        <a href="assignment.html">Home</a>
        <a href="register.html">REGISTER</a>
        <a href="next.html">Media</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h2>Contact Form</h2>
        <form action="submit_contact.php" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" required rows="5" placeholder="Enter your message"></textarea>
            </div>
            <input type="submit" value="Send Message">
        </form>

        <div class="contact-info">
            <h3>Our Contact Information:</h3>
            <p class="address"><strong>Address:</strong> University of Kabianga, P.O. Box 2030-30400, Kericho, Kenya</p>
            <p class="phone"><strong>Phone:</strong> +254 712 345 678</p>
            <p class="email"><strong>Email:</strong> info@kabianga.ac.ke</p>
        </div>
    </div>

</body>
</html>
